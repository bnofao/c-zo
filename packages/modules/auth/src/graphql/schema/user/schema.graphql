type User implements Node {
  id: ID!
  name: String!
  email: String!
  role: String!
  banned: Boolean!
  banReason: String
  banExpires: DateTime
  createdAt: DateTime!
}

type UserSession implements Node {
  id: ID!
  userId: ID!
  expiresAt: DateTime!
  ipAddress: String
  userAgent: String
  impersonatedBy: String
  createdAt: DateTime!
}

# ─── Connection types ─────────────────────────

type UserConnection {
  edges: [UserEdge!]!
  pageInfo: PageInfo!
  totalCount: Int
}

type UserEdge {
  node: User!
  cursor: String!
}

# ─── Ordering ─────────────────────────────────

enum UserOrderField {
  NAME
  EMAIL
  CREATED_AT
}

input UserOrderByInput {
  field: UserOrderField!
  dir: OrderDirection!
}

# ─── Inputs ───────────────────────────────────

input CreateUserInput {
  email: EmailAddress!
  name: String!
  password: String
  role: [String!]
}

input UpdateUserInput {
  name: String
  role: [String!]
}

# ─── Filters ─────────────────────────────────

input UserWhereInput {
  name: StringFilterInput
  email: StringFilterInput
  emailVerified: BooleanFilterInput
  twoFactorEnabled: BooleanFilterInput
  banned: BooleanFilterInput
  banReason: StringFilterInput
  banExpires: DateTimeFilterInput
  createdAt: DateTimeFilterInput
  AND: [UserWhereInput!]
  OR: [UserWhereInput!]
  NOT: UserWhereInput
}

# ─── Queries ──────────────────────────────────

extend type Query {
  """Fetch a user by its Relay global ID."""
  user(id: ID!): User @admin
  """List users with cursor-based pagination."""
  users(
    first: Int
    after: String
    last: Int
    before: String
    search: String
    orderBy: [UserOrderByInput!]
    where: UserWhereInput
  ): UserConnection! @admin
  """List sessions for a given user."""
  userSessions(userId: ID!): [UserSession!]! @admin
}

# ─── Mutation payloads ────────────────────────

type CreateUserPayload {
  user: User
  userErrors: [UserError!]!
}

type UpdateUserPayload {
  user: User
  userErrors: [UserError!]!
}

type BanUserPayload {
  user: User
  userErrors: [UserError!]!
}

type UnbanUserPayload {
  user: User
  userErrors: [UserError!]!
}

type SetRolePayload {
  user: User
  userErrors: [UserError!]!
}

type RemoveUserPayload {
  user: User
  userErrors: [UserError!]!
}

type ImpersonateUserPayload {
  success: Boolean
  userErrors: [UserError!]!
}

type StopImpersonationPayload {
  success: Boolean
  userErrors: [UserError!]!
}

type SetUserPasswordPayload {
  success: Boolean
  userErrors: [UserError!]!
}

type RevokeSessionPayload {
  success: Boolean
  userErrors: [UserError!]!
}

type RevokeSessionsPayload {
  success: Boolean
  userErrors: [UserError!]!
}

extend type Mutation {
  createUser(input: CreateUserInput!): CreateUserPayload! @permission(resource: "user", action: "create")
  updateUser(userId: ID!, input: UpdateUserInput!): UpdateUserPayload! @permission(resource: "user", action: "update")
  banUser(userId: ID!, reason: String, expiresIn: Int): BanUserPayload! @permission(resource: "user", action: "ban")
  unbanUser(userId: ID!): UnbanUserPayload! @permission(resource: "user", action: "ban")
  setRole(userId: ID!, role: String!): SetRolePayload! @permission(resource: "user", action: "set-role")
  setUserPassword(userId: ID!, newPassword: String!): SetUserPasswordPayload! @admin
  removeUser(userId: ID!): RemoveUserPayload! @permission(resource: "user", action: "delete")
  impersonateUser(userId: ID!): ImpersonateUserPayload! @permission(resource: "user", action: "impersonate")
  stopImpersonation: StopImpersonationPayload! @admin
  revokeSession(sessionToken: String!): RevokeSessionPayload! @permission(resource: "session", action: "revoke")
  revokeSessions(userId: ID!): RevokeSessionsPayload! @permission(resource: "session", action: "revoke")
}
