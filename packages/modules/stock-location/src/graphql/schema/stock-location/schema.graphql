type StockLocation {
  id: ID!
  organizationId: ID!
  handle: String!
  name: String!
  isDefault: Boolean!
  isActive: Boolean!
  metadata: JSON
  address: StockLocationAddress
  createdAt: DateTime!
  updatedAt: DateTime!
}

type StockLocationAddress {
  id: ID!
  addressLine1: String!
  addressLine2: String
  city: String!
  province: String
  postalCode: String
  countryCode: String!
  phone: String
}

input CreateStockLocationAddressInput {
  addressLine1: String!
  addressLine2: String
  city: String!
  province: String
  postalCode: String
  countryCode: String!
  phone: String
}

input CreateStockLocationInput {
  name: String!
  handle: String
  organizationId: ID
  address: CreateStockLocationAddressInput!
  metadata: JSON
}

input UpdateStockLocationInput {
  name: String
  handle: String
  metadata: JSON
  address: UpdateStockLocationAddressInput
}

input UpdateStockLocationAddressInput {
  addressLine1: String
  addressLine2: String
  city: String
  province: String
  postalCode: String
  countryCode: String
  phone: String
}

extend type Mutation {
  createStockLocation(input: CreateStockLocationInput!): StockLocation!
    @permission(resource: "stock-location", action: "create")

  updateStockLocation(id: ID!, input: UpdateStockLocationInput!): StockLocation!
    @permission(resource: "stock-location", action: "update")

  updateStockLocationAddress(stockLocationId: ID!, input: UpdateStockLocationAddressInput!): StockLocationAddress!
    @permission(resource: "stock-location", action: "update")
}
