# Coolify deployment compose (Coolify always builds before `up`). For a manual
# local run, build first — `docker compose up --build` — otherwise `migrate` and
# `life-worker` fail: they reuse the `life`-built `czo/life:latest` and never pull.
services:
  migrate:
    image: czo/life:latest
    pull_policy: never
    command: ["pnpm", "migrate"]
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?}

  life:
    build:
      context: .
      dockerfile: apps/life/Dockerfile
    image: czo/life:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      TRUSTED_PROXY_HOPS: 1
      DATABASE_URL: ${DATABASE_URL:?}
      AUTH_SECRET: ${SERVICE_PASSWORD_64_AUTH:?}
      AUTH_APP: life
      SERVICE_FQDN_LIFE_4000: ${SERVICE_FQDN_LIFE_4000}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  life-worker:
    image: czo/life:latest
    pull_policy: never
    command: ["pnpm", "--filter", "@czo/life", "worker"]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?}
      AUTH_SECRET: ${SERVICE_PASSWORD_64_AUTH:?}
      AUTH_APP: life

  tour:
    build:
      context: .
      dockerfile: apps/tour/Dockerfile
    image: czo/tour:latest
    restart: unless-stopped
    depends_on:
      life:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LIFE_URL: http://life:4000
      SERVICE_FQDN_TOUR_3000: ${SERVICE_FQDN_TOUR_3000}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
