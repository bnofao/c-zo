# Coolify deployment compose (Coolify always builds before `up`). For a manual
# local run, build first — `docker compose up --build` — otherwise `migrate` and
# `life-worker` fail: they reuse the `life`-built `czo/life:latest` and never pull.
services:
  migrate:
    image: czo/life:latest
    pull_policy: never
    command: ["pnpm", "migrate"]
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?}
    networks:
      - coolify

  life:
    build:
      context: .
      dockerfile: apps/life/Dockerfile
    image: czo/life:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      TRUSTED_PROXY_HOPS: 1
      DATABASE_URL: ${DATABASE_URL:?}
      AUTH_SECRET: ${SERVICE_PASSWORD_64_AUTH:?}
      AUTH_APP: life
      # OpenAPI docs (/openapi.json + /reference). Unset → kit's default (on
      # outside production, off in production). Set `false` to force off, or
      # `true` to expose them in production.
      OPENAPI_ENABLED: ${OPENAPI_ENABLED-false}
      # Initial admin user — created idempotently on boot (ensure-by-email).
      # Set BOTH email + password to bootstrap; unset in production → no admin
      # is seeded. Dev uses built-in defaults (admin@life.dev). INITIAL_ADMIN_ROLE
      # accepts a CSV for multiple platform roles.
      # EMAIL + PASSWORD are SECRETS: provide via Coolify secret env (never
      # commit values); the app reads them via Config.redacted (never logged).
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD-}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME-Admin}
      INITIAL_ADMIN_ROLE: ${INITIAL_ADMIN_ROLE-admin}
      # Telemetry → OTel Collector (observability stack, same `coolify` network).
      # apps/life/src/runtime.ts only exports when the endpoint is set; set the
      # var to empty in Coolify to disable if the observability stack isn't up.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT-http://otel-collector:4318}
      OTEL_SERVICE_NAME: life
      SERVICE_FQDN_LIFE_4000: ${SERVICE_FQDN_LIFE_4000}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - coolify

  life-worker:
    image: czo/life:latest
    pull_policy: never
    command: ["pnpm", "--filter", "@czo/life", "worker"]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?}
      AUTH_SECRET: ${SERVICE_PASSWORD_64_AUTH:?}
      AUTH_APP: life
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT-http://otel-collector:4318}
      OTEL_SERVICE_NAME: life-worker
    networks:
      - coolify

  tour:
    build:
      context: .
      dockerfile: apps/tour/Dockerfile
    image: czo/tour:latest
    restart: unless-stopped
    depends_on:
      life:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LIFE_URL: http://life:4000
      SERVICE_FQDN_TOUR_3000: ${SERVICE_FQDN_TOUR_3000}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - coolify

networks:
  # Coolify's shared default network (external = pre-existing). Same network the
  # observability stack joins, so `life`/`life-worker` reach `otel-collector:4318`
  # by name, and `tour` reaches `life:4000`. Postgres is the Coolify-managed DB
  # (referenced via DATABASE_URL); attach it to `coolify` too if not already.
  coolify:
    external: true
