  """Unique identifier of this variant-to-price-set binding."""
  id: Int!

  """Identifier of the organization that owns this binding."""
  organizationId: Int!

  """
  Cross-module reference to the bound PriceSet in @czo/price; resolve the node separately.
  """
  priceSetId: Int!
